<!-- Contenedor Principal: Fondo Mar Profundo -->
<div class="relative min-h-screen w-full bg-[#001219] overflow-hidden flex flex-col items-center justify-center font-sans">
  
  <!-- Efectos de Luces de Profundidad (Blobs) -->
  <div class="absolute top-0 -left-20 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px] animate-pulse"></div>
  <div class="absolute bottom-0 -right-20 w-96 h-96 bg-cyan-500/10 rounded-full blur-[120px]"></div>

  <!-- Capa de ruido sutil o patrón de malla (Opcional) -->
  <div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>

  <div class="relative z-10 max-w-4xl px-6 text-center">
    
    <!-- Badge Tecnológico -->
    <div class="mb-8 inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-950/50 border border-blue-500/30 text-blue-400 text-xs font-mono tracking-widest uppercase">
      <span class="relative flex h-2 w-2">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-500"></span>
      </span>
      Neural Engine Active
    </div>

    <!-- Título con Gradiente -->
    <h1 class="text-7xl md:text-9xl font-black tracking-tighter text-white mb-6">
      I<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-cyan-400">A</span>
    </h1>

    <!-- Subtítulo / Descripción -->
    <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-12 leading-relaxed">
      Reconocimiento de dígitos manuscritos mediante redes neuronales multicapa. 
      Visualiza el aprendizaje de matrices y desafía la percepción de la máquina.
    </p>

    <!-- Botones Modernos -->
    <div class="flex flex-col md:flex-row items-center justify-center gap-6">
      
      <!-- Botón Principal: Usar IA -->
      <button routerLink="/ai/try"
        class="group relative w-full md:w-auto px-10 py-4 bg-blue-600 rounded-2xl font-bold text-white transition-all duration-300 
               hover:bg-blue-500 hover:scale-105 hover:shadow-[0_0_30px_rgba(37,99,235,0.5)] flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        Probar Modelo
      </button>

      <!-- Botón Secundario: Entrenar -->
      <button routerLink="/ai/train"
        class="w-full md:w-auto px-10 py-4 rounded-2xl font-bold text-slate-300 border border-slate-700 
               transition-all duration-300 hover:bg-slate-800 hover:border-slate-500 flex items-center justify-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        Entrenar IA
      </button>

    </div>
  </div>

  <!-- Mini Stats (Decorativo) -->
  <div class="absolute bottom-10 left-0 right-0 flex justify-center gap-12 text-[10px] font-mono text-slate-600 tracking-[0.3em] uppercase">
    <div class="flex flex-col items-center"><span class="text-blue-500 mb-1 italic">Dataset</span> MNIST</div>
    <div class="flex flex-col items-center"><span class="text-blue-500 mb-1 italic">Status</span> Ready</div>
  </div>
</div>
